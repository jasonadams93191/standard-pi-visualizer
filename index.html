<style>
  body { font-family: 'Lato', sans-serif; background: linear-gradient(135deg, #F5F5F5 0%, #eeeeee 100%); }
  h1,h2,h3,h4 { font-family: 'Montserrat', sans-serif; }
  .mono-num { font-variant-numeric: tabular-nums; }
  .mermaid svg { width: 100% !important; height: 100% !important; max-width: none !important; cursor: grab; }
  .mermaid svg:active { cursor: grabbing; }
  #diagram-host { background: #fafbfc; border-radius: 0 0 8px 8px; height: 75vh; min-height: 600px; position: relative; overflow: hidden; }
  #diagram-host.fullscreen { height: 100vh; border-radius: 0; }
  /* SF chrome */
  .sf-appbar { background: linear-gradient(180deg, #ffffff, #f3f3f3); border-bottom: 1px solid var(--sf-border); }
  .sf-tab-active { box-shadow: inset 0 -3px 0 #0176d3; color: #032d60; }
  .sf-card { background: white; border: 1px solid #dddbda; border-radius: 6px; box-shadow: 0 2px 2px rgba(0,0,0,0.04); }
  .sf-card-header { background: #f3f3f3; border-bottom: 1px solid #dddbda; padding: 8px 12px; font-size: 13px; font-weight: 700; color: #032d60; display: flex; align-items: center; justify-content: space-between; }
  .sf-card-body { padding: 12px 14px; font-size: 13px; color: #1A1A1A; }
  .sf-detail-row { display: grid; grid-template-columns: 40% 60%; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f3f3f3; font-size: 12.5px; }
  .sf-detail-row:last-child { border-bottom: none; }
  .sf-detail-label { color: #706e6b; }
  .sf-detail-value { color: #1A1A1A; font-weight: 500; }
  .sf-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; font-family: 'Montserrat', sans-serif; }
  .sf-pill-blue { background: #cfe2ff; color: #032d60; }
  .sf-pill-green { background: #c8e6c9; color: #1b5e20; }
  .sf-pill-gold { background: #FFD700; color: #1A1A1A; }
  .sf-pill-red { background: #fce4ec; color: #b71c1c; }
  .sf-action-btn { background: white; border: 1px solid #dddbda; padding: 5px 12px; font-size: 12px; font-weight: 600; color: #032d60; border-radius: 4px; cursor: pointer; }
  .sf-action-btn:hover { background: #f3f3f3; }
  .sf-action-btn.primary { background: #0176d3; color: white; border-color: #0176d3; }
  .sf-action-btn.primary:hover { background: #014486; }
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; background: #0176d3; flex-shrink: 0; margin-top: 5px; }
  .timeline-dot.gold { background: #FFD700; }
  .timeline-dot.success { background: #28A745; }
  .timeline-dot.muted { background: #ADADAD; }
  .timeline-line { width: 2px; background: #dddbda; flex-shrink: 0; margin: 0 4px; }
  /* Mermaid theming via CSS where useful */
  .focus-pulse { animation: pulse 0.6s ease-out; }
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
</style>

// FEEDBACK SYSTEM — per-section comments saved to localStorage
// =================================================================

const FeedbackContext = React.createContext({ feedback: [], addFeedback: () => {}, removeFeedback: () => {}, clearAll: () => {} });

function FeedbackProvider({ children }) {
  const [feedback, setFeedback] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const API_URL = '/api/feedback';

  // Initial load + 30s polling so cross-device updates appear
  const refresh = React.useCallback(async () => {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error('GET ' + res.status);
      const data = await res.json();
      const norm = data.map((d) => ({
        id: d.id,
        section: d.section,
        label: d.label,
        rating: d.rating,
        text: d.text,
        timestamp: d.created_at,
      }));
      setFeedback(norm);
      setError(null);
    } catch (e) {
      console.warn('Feedback refresh failed:', e);
      setError(String(e.message || e));
    } finally {
      setLoading(false);
    }
  }, []);

  React.useEffect(() => {
    refresh();
    const t = setInterval(refresh, 30000);
    return () => clearInterval(t);
  }, [refresh]);

  const addFeedback = async (entry) => {
    // Optimistic
    const optimistic = { ...entry, id: 'temp-' + Date.now(), timestamp: new Date().toISOString() };
    setFeedback((prev) => [...prev, optimistic]);
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entry),
      });
      if (!res.ok) throw new Error('POST ' + res.status);
      const saved = await res.json();
      setFeedback((prev) => prev.map((f) => (f.id === optimistic.id ? { ...saved, timestamp: saved.created_at } : f)));
    } catch (e) {
      console.error('Feedback save failed:', e);
      setError('Save failed: ' + (e.message || e));
      // Roll back
      setFeedback((prev) => prev.filter((f) => f.id !== optimistic.id));
      alert('Could not save feedback: ' + (e.message || e));
    }
  };

  const removeFeedback = async (id) => {
    const prev = feedback;
    setFeedback((p) => p.filter((f) => f.id !== id));
    try {
      const res = await fetch(`${API_URL}?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('DELETE ' + res.status);
    } catch (e) {
      console.error('Delete failed:', e);
      setFeedback(prev);
      alert('Could not delete: ' + (e.message || e));
    }
  };

  const clearAll = async () => {
    if (!confirm('Clear ALL feedback for everyone? This cannot be undone.')) return;
    const ids = feedback.map((f) => f.id);
    setFeedback([]);
    try {
      await Promise.all(ids.map((id) => fetch(`${API_URL}?id=${encodeURIComponent(id)}`, { method: 'DELETE' })));
    } catch (e) {
      console.error('Clear all failed:', e);
      refresh();
    }
  };

  return (
    <FeedbackContext.Provider value={{ feedback, addFeedback, removeFeedback, clearAll, loading, error, refresh }}>
      {children}
    </FeedbackContext.Provider>
  );
}
function useFeedback() { return React.useContext(FeedbackContext); }

function Feedback({ section, label }) {
  const { feedback, addFeedback } = useFeedback();
  const [open, setOpen] = React.useState(false);
  const [text, setText] = React.useState('');
  const [rating, setRating] = React.useState(null);
  const ref = React.useRef(null);
  const sectionFeedback = feedback.filter((f) => f.section === section);

  React.useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    setTimeout(() => document.addEventListener('mousedown', close), 50);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);

  const submit = (e) => {
    e?.stopPropagation();
    if (!text.trim() && !rating) return;
    addFeedback({ section, label: label || section, text: text.trim(), rating });
    setText('');
    setRating(null);
    setOpen(false);
  };

  return (
    <div className="relative inline-block" ref={ref} onClick={(e) => e.stopPropagation()}>
      <button
        onClick={(e) => { e.stopPropagation(); setOpen(!open); }}
        className={`text-[11px] px-1.5 py-0.5 rounded transition-colors ${sectionFeedback.length > 0 ? 'bg-acs-gold text-acs-charcoal hover:bg-yellow-400' : 'text-gray-400 hover:bg-gray-100 hover:text-acs-blue'}`}
        title={`Feedback on "${label || section}"${sectionFeedback.length ? ` (${sectionFeedback.length})` : ''}`}
      >
        <span className="mr-0.5">💬</span>
        {sectionFeedback.length > 0 && <span className="font-bold">{sectionFeedback.length}</span>}
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-1 z-50 bg-white border border-sf-border rounded-lg shadow-xl w-80 p-3" onClick={(e) => e.stopPropagation()}>
          <div className="flex items-center justify-between mb-2">
            <div className="text-[12px] font-mont font-bold text-sf-navy">Feedback: <span className="text-acs-blue">{label || section}</span></div>
            <button onClick={() => setOpen(false)} className="text-gray-400 hover:text-acs-error text-[14px]">×</button>
          </div>
          <div className="flex gap-2 mb-2">
            <button onClick={() => setRating(rating === 'up' ? null : 'up')} className={`px-3 py-1 rounded text-[14px] border ${rating === 'up' ? 'bg-acs-success text-white border-acs-success' : 'bg-white border-gray-300 hover:bg-green-50'}`}>👍</button>
            <button onClick={() => setRating(rating === 'down' ? null : 'down')} className={`px-3 py-1 rounded text-[14px] border ${rating === 'down' ? 'bg-acs-error text-white border-acs-error' : 'bg-white border-gray-300 hover:bg-red-50'}`}>👎</button>
            <span className="text-[10.5px] text-gray-500 self-center">Optional rating</span>
          </div>
          <textarea
            value={text}
            onChange={(e) => setText(e.target.value)}
            placeholder="What works? What needs to change?"
            className="w-full border border-sf-border rounded p-2 text-[12px] focus:outline-none focus:border-acs-blue"
            rows="3"
            onKeyDown={(e) => { if (e.ctrlKey && e.key === 'Enter') submit(e); }}
          />
          <div className="flex justify-between items-center mt-2">
            <span className="text-[10px] text-gray-400">Ctrl+Enter to save</span>
            <button onClick={submit} className="bg-acs-blue hover:bg-acs-dark-blue text-white px-3 py-1 rounded text-[11.5px] font-mont font-semibold">Save Feedback</button>
          </div>
          {sectionFeedback.length > 0 && (
            <div className="mt-3 pt-3 border-t border-gray-200">
              <div className="text-[10.5px] font-mont uppercase tracking-wider text-gray-500 mb-1.5">Previous Feedback ({sectionFeedback.length})</div>
              <div className="space-y-1.5 max-h-40 overflow-y-auto">
                {sectionFeedback.map((f) => (
                  <div key={f.id} className="bg-gray-50 px-2 py-1.5 rounded text-[11.5px] border-l-2 border-acs-blue">
                    <div className="flex items-baseline justify-between mb-0.5">
                      <span>{f.rating === 'up' ? '👍' : f.rating === 'down' ? '👎' : ''}</span>
                      <span className="text-[10px] text-gray-400">{new Date(f.timestamp).toLocaleString()}</span>
                    </div>
                    {f.text && <div className="text-gray-700">{f.text}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function FeedbackHub() {
  const { feedback, removeFeedback, clearAll } = useFeedback();
  const [open, setOpen] = React.useState(false);

  const exportText = () => {
    return feedback.map((f) => {
      const r = f.rating === 'up' ? '[👍]' : f.rating === 'down' ? '[👎]' : '';
      const time = new Date(f.timestamp).toLocaleString();
      return `[${f.label}] ${r} ${f.text || '(rating only)'} — ${time}`;
    }).join('\n\n');
  };

  const copyAll = async () => {
    if (feedback.length === 0) return;
    try { await navigator.clipboard.writeText(exportText()); alert('Feedback copied to clipboard.'); }
    catch { alert('Copy failed; try the Download option instead.'); }
  };

  const download = () => {
    const blob = new Blob([JSON.stringify(feedback, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `standard-pi-feedback-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <>
      <button
        onClick={() => setOpen(!open)}
        className="fixed bottom-6 right-6 z-40 bg-acs-blue hover:bg-acs-dark-blue text-white px-4 py-2.5 rounded-full shadow-lg flex items-center gap-2 font-mont font-semibold text-[12.5px]"
        title="Feedback Hub"
      >
        <span>💬</span>
        <span>Feedback</span>
        {feedback.length > 0 && (
          <span className="bg-acs-gold text-acs-charcoal rounded-full px-2 py-0.5 text-[10.5px] font-bold mono-num">{feedback.length}</span>
        )}
      </button>

      {open && (
        <div className="fixed bottom-20 right-6 z-40 bg-white border border-sf-border rounded-lg shadow-2xl w-[440px] max-w-[calc(100vw-3rem)] max-h-[80vh] flex flex-col">
          <div className="flex items-center justify-between px-4 py-3 border-b border-sf-border bg-gradient-to-r from-acs-blue to-acs-dark-blue text-white rounded-t-lg">
            <div>
              <div className="font-mont font-bold text-[14px]">Feedback Hub</div>
              <div className="text-[11px] opacity-90">{feedback.length} {feedback.length === 1 ? 'item' : 'items'} · syncing across devices</div>
            </div>
            <button onClick={() => setOpen(false)} className="text-white/80 hover:text-white text-[18px]">×</button>
          </div>

          <div className="flex gap-1.5 px-3 py-2 border-b border-sf-border bg-gray-50">
            <button onClick={copyAll} disabled={feedback.length === 0} className="sf-action-btn flex-1 disabled:opacity-50">📋 Copy All</button>
            <button onClick={download} disabled={feedback.length === 0} className="sf-action-btn flex-1 disabled:opacity-50">⤓ Download JSON</button>
            <button onClick={clearAll} disabled={feedback.length === 0} className="sf-action-btn disabled:opacity-50">🗑 Clear</button>
          </div>

          <div className="flex-1 overflow-y-auto p-3 space-y-2">
            {feedback.length === 0 ? (
              <div className="text-center py-8 text-gray-400 text-[12.5px]">
                No feedback yet. Click any 💬 button on the page to leave a comment.
              </div>
            ) : (
              feedback.slice().reverse().map((f) => (
                <div key={f.id} className="border border-sf-border rounded p-2.5 bg-white">
                  <div className="flex items-baseline justify-between mb-1">
                    <span className="font-mont font-bold text-[11.5px] text-acs-blue">{f.label}</span>
                    <span className="text-[10px] text-gray-400 mono-num">{new Date(f.timestamp).toLocaleString()}</span>
                  </div>
                  <div className="flex items-start gap-2">
                    <span className="text-[14px]">{f.rating === 'up' ? '👍' : f.rating === 'down' ? '👎' : '💬'}</span>
                    <div className="flex-1 text-[12px] text-gray-700 leading-relaxed">{f.text || <em className="text-gray-400">(rating only)</em>}</div>
                    <button onClick={() => removeFeedback(f.id)} className="text-gray-300 hover:text-acs-error text-[12px]" title="Remove">×</button>
                  </div>
                </div>
              ))
            )}
          </div>

          <div className="px-3 py-2 border-t border-sf-border bg-gray-50 text-[10.5px] text-gray-500 rounded-b-lg">
            Saved to a shared database — visible across devices. Auto-refreshes every 30s.
          </div>
        </div>
      )}
    </>
  );
}

const GLOSSARY = [
  { term: 'PI', cite: 'Personal Injury', body: 'Civil claim for bodily injury caused by another party’s negligence, recklessness, or intentional conduct. Damages typically include past + future medical expenses, past + future wage loss, and pain & suffering.' },
  { term: 'GL', cite: 'General Liability', body: 'The defendant’s general-liability insurance policy. Most premises and product cases tender to a GL carrier first; auto cases tender to a BIPD policy. Identify the GL carrier early — every demand goes there.' },
  { term: 'MMI', cite: 'Maximum Medical Improvement', body: 'The point at which a treating provider determines further treatment will not materially improve the patient’s condition. Demands are typically held until MMI (or a documented future-care opinion) so total damages can be quantified.' },
  { term: 'IME', cite: 'Independent Medical Examination', body: 'Defense-retained physician’s exam of the plaintiff. Almost always disputes causation, severity, or future-care need. Plaintiff is entitled to the report.' },
  { term: 'MIST', cite: 'Minor Impact Soft Tissue', body: 'Defense framing for low-property-damage auto cases. Carriers underpay aggressively; the photos and bio-mechanical experts decide it.' },
  { term: 'DOL', cite: 'Date of Loss', body: 'The incident date. Anchors the statute of limitations clock and every medical chronology.' },
  { term: 'SOL', cite: 'Statute of Limitations', body: 'State-specific filing deadline. MN tort SOL is 6 years; many states are 2 or 3. Miss it and the case is dead — calendar the SOL the day intake is opened.' },
  { term: 'UM / UIM', cite: 'Uninsured / Underinsured Motorist', body: 'Coverage on the plaintiff’s own auto policy that pays when the at-fault driver has no insurance (UM) or insufficient limits (UIM). Often the second tender after the at-fault carrier.' },
  { term: 'Med Pay', cite: 'Medical Payments coverage', body: 'No-fault medical-bill coverage on auto policies (typically $1K-$10K). Pays plaintiff’s medicals regardless of fault; subrogated against any third-party recovery.' },
  { term: 'PIP', cite: 'Personal Injury Protection', body: 'No-fault auto coverage in PIP states (MN included). Pays medicals + lost wages up to a statutory cap regardless of fault. Subrogates against third-party recovery in tort-threshold states.' },
  { term: 'Subro', cite: 'Subrogation', body: 'A payor’s right to recover from a third-party tortfeasor what it paid the insured. Health insurer, Med Pay, PIP, ERISA plan, Medicare, Medicaid all assert subro liens against PI recoveries.' },
  { term: 'ERISA', cite: 'Employee Retirement Income Security Act, 29 U.S.C. § 1001 et seq.', body: 'Federal law governing employer-sponsored health plans. Self-funded ERISA plans have first-dollar reimbursement rights and the strongest lien position; fully-insured plans are subject to state make-whole rules. ERISA lien analysis (self-funded vs. fully-insured) is the critical first step.' },
  { term: 'Lien', cite: 'Any third-party right to recover from settlement', body: 'Health insurer, Medicare, Medicaid, hospital, ERISA plan, PIP / Med Pay subro. All must be verified, negotiated, and paid before client net is calculated. Lien posture finalized before mediation.' },
  { term: 'Demand', cite: 'Pre-suit settlement letter with full medicals', body: 'The pre-suit settlement demand. Liability narrative + damages narrative + numbered exhibits + settlement number + 30-60 day deadline. Sent certified to the carrier. Rejection or counter is the litigation trigger.' },
  { term: 'Mediation', cite: 'ADR proceeding before retired judge or trained neutral', body: 'Modal point of resolution in PI litigation. Mediator confirmed, brief filed 1 week prior, client walk-away in writing, lien posture finalized. Settlement rate is high when both sides come prepared.' },
  { term: 'MSJ', cite: 'Motion for Summary Judgment', body: 'Defense motion to dispose of the case before trial. Common in premises (open-and-obvious), comparative-fault-bar states, and product cases. Calendar the MSJ deadline and file opposition with expert affidavits.' },

function RoleChip({ role }) {
  const cls = (() => {
    const r = role.toLowerCase();
    if (r.includes('attorney') || r.includes('partner')) return 'bg-blue-100 text-acs-dark-blue';
    if (r.includes('associate')) return 'bg-amber-100 text-amber-900';
    if (r.includes('paralegal')) return 'bg-green-100 text-green-900';
    if (r.includes('intake')) return 'bg-pink-100 text-pink-900';
    if (r.includes('referee') || r.includes('appraiser') || r.includes('cpa') || r.includes('claimant') || r.includes('escrow')) return 'bg-purple-100 text-purple-900';
    if (r.includes('judge')) return 'bg-acs-charcoal text-white';
    if (r.includes('broker')) return 'bg-yellow-100 text-yellow-900';
    if (r.includes('court')) return 'bg-gray-200 text-gray-800';
    return 'bg-gray-100 text-gray-700';
  })();
  return <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold tracking-wide ${cls}`}>{role}</span>;
}

function WorkflowTab() {
  // hostRef → an inner div with NO React children. Mermaid's SVG goes here; React

  // (zoom %, focus button highlight) cannot wipe the diagram.
  const hostRef = useRef(null);
  const panZoomRef = useRef(null);
  const [status, setStatus] = useState('init'); // init | loading | ready | error
  const [errMsg, setErrMsg] = useState('');
  const [zoomPct, setZoomPct] = useState(100);
  const [activeFocus, setActiveFocus] = useState(null);

  useEffect(() => {
    let cancelled = false;
    let resizeObserver;

    const wait = (ms) => new Promise((r) => setTimeout(r, ms));

    const init = async () => {
      setStatus('loading');
      // 1. Wait until BOTH libraries are loaded.
      let tries = 0;
      while ((!window.mermaid || !window.svgPanZoom) && tries < 60) {
        await wait(100);
        tries++;
        if (cancelled) return;
      }
      if (!window.mermaid) {
        setErrMsg('Mermaid library failed to load');
        setStatus('error');
        return;
      }
      if (!window.svgPanZoom) {
        setErrMsg('svg-pan-zoom library failed to load');
        setStatus('error');
        return;
      }

      // 2. Initialize mermaid
      try {
        window.mermaid.initialize({
          startOnLoad: false,
          theme: 'base',
          themeVariables: {
            primaryColor: '#E8F0FE',
            primaryTextColor: '#1A1A1A',
            primaryBorderColor: '#0057B8',
            lineColor: '#003D80',
            secondaryColor: '#FFF8E1',
            tertiaryColor: '#F5F5F5',
            fontFamily: 'Montserrat, sans-serif',
            fontSize: '13px',
            clusterBkg: '#FAFAFA',
            clusterBorder: '#0057B8',
            edgeLabelBackground: '#FFFFFF',
          },
          flowchart: { htmlLabels: true, curve: 'basis', padding: 16, nodeSpacing: 28, rankSpacing: 50 },
        });
      } catch (e) {
        console.error('mermaid.initialize failed:', e);
        setErrMsg('Mermaid init failed: ' + e.message);
        setStatus('error');
        return;
      }

      // 3. Render the flowchart
      let svg;
      try {
        const id = 'pi-mermaid-' + Math.floor(Math.random() * 1e9);
        const result = await window.mermaid.render(id, MERMAID_SOURCE);
        svg = result.svg;
      } catch (e) {
        console.error('mermaid.render failed:', e);
        setErrMsg('Render failed: ' + e.message);
        setStatus('error');
        return;
      }
      if (cancelled || !hostRef.current) return;

      // 4. Inject SVG into the uncontrolled host div
      hostRef.current.innerHTML = svg;
      const svgEl = hostRef.current.querySelector('svg');
      if (!svgEl) {
        setErrMsg('SVG not found after render');
        setStatus('error');
        return;
      }
      svgEl.removeAttribute('width');
      svgEl.removeAttribute('height');
      svgEl.style.width = '100%';
      svgEl.style.height = '100%';
      svgEl.style.maxWidth = 'none';
      svgEl.style.display = 'block';

      // 5. Attach svg-pan-zoom
      try {
        panZoomRef.current = window.svgPanZoom(svgEl, {
          zoomEnabled: true,
          panEnabled: true,
          controlIconsEnabled: false,
          fit: true,
          center: true,
          minZoom: 0.2,
          maxZoom: 8,
          zoomScaleSensitivity: 0.4,
          onZoom: (z) => setZoomPct(Math.round(z * 100)),
        });
        setZoomPct(Math.round(panZoomRef.current.getZoom() * 100));
      } catch (e) {
        console.error('svgPanZoom init failed:', e);
        setErrMsg('Pan/zoom init failed: ' + e.message);
        setStatus('error');
        return;
      }

      // 6. Resize observer to keep diagram fit when container resizes
      resizeObserver = new ResizeObserver(() => {
        if (panZoomRef.current) {
          panZoomRef.current.resize();
          panZoomRef.current.fit();
          panZoomRef.current.center();
        }
      });
      if (hostRef.current) resizeObserver.observe(hostRef.current);

      setStatus('ready');
      console.log('[WorkflowTab] diagram ready. cluster ids:',
        Array.from(svgEl.querySelectorAll('g.cluster, g.subgraph')).map((g) => g.id));
    };

    init();

    return () => {
      cancelled = true;
      if (resizeObserver) resizeObserver.disconnect();
      if (panZoomRef.current) {
        try { panZoomRef.current.destroy(); } catch (e) {}
        panZoomRef.current = null;
      }
      // Clean up the injected SVG so a remount starts fresh
      if (hostRef.current) hostRef.current.innerHTML = '';
    };
  }, []);

  const zoomIn = () => panZoomRef.current?.zoomBy(1.3);
  const zoomOut = () => panZoomRef.current?.zoomBy(0.77);
  const fit = () => {
    if (!panZoomRef.current) return;
    panZoomRef.current.resize();
    panZoomRef.current.fit();
    panZoomRef.current.center();
    setActiveFocus(null);
  };
  const fullscreen = () => {
    const c = document.getElementById('diagram-host');
    if (!c) return;
    if (!document.fullscreenElement) {
      c.classList.add('fullscreen');
      c.requestFullscreen?.();
    } else {
      c.classList.remove('fullscreen');
      document.exitFullscreen?.();
    }
    setTimeout(() => {
      if (panZoomRef.current) {
        panZoomRef.current.resize();
        panZoomRef.current.fit();
        panZoomRef.current.center();
      }
    }, 250);
  };

  const findCluster = (subgraphId) => {
    const svg = hostRef.current?.querySelector('svg');
    if (!svg) return null;
    const clusters = Array.from(svg.querySelectorAll('g.cluster, g.subgraph, g[id^="flowchart-"], g[id^="subGraph"]'));
    // Strategy 1: id contains the subgraphId verbatim
    for (const g of clusters) {
      if (g.id && g.id.toUpperCase().includes(subgraphId)) return g;
    }
    // Strategy 2: label-text match
    const LABEL_MAP = {
      INTAKE: /^\s*1\.\s*INTAKE\s*$/i,
      CONSULT: /CONSULTATION/i,
      PRELIT: /PRE-?LITIGATION/i,
      PLEAD: /PLEADINGS/i,
      DISC: /DISCOVERY/i,
      PI_BRANCH: /Litigation Track/i,
      IJ: /INTERLOCUTORY/i,
      SALE: /MANNER OF Personal Injury/i,
      ACCT: /ACCOUNTING/i,
      FEES: /FINAL JUDGMENT/i,
      CLOSE: /CLOSEOUT/i,
    };
    const re = LABEL_MAP[subgraphId];
    if (re) {
      // Look at cluster-label text specifically (not the children)
      for (const g of clusters) {
        const labelEl = g.querySelector('.cluster-label, .nodeLabel, foreignObject, text');
        const t = (labelEl?.textContent || '').trim();
        if (re.test(t)) return g;
      }
      // Last resort: full textContent
      for (const g of clusters) {
        const t = (g.textContent || '').trim();
        if (re.test(t)) return g;
      }
    }
    return null;
  };

  const focusOn = (subgraphId) => {
    if (!panZoomRef.current || !hostRef.current) return;
    const cluster = findCluster(subgraphId);
    if (!cluster) {
      console.warn('[focusOn] cluster not found for', subgraphId,
        '— available cluster ids:',
        Array.from(hostRef.current.querySelectorAll('g.cluster, g.subgraph')).map(g => g.id));
      return;
    }
    const bbox = cluster.getBBox();
    if (!bbox.width || !bbox.height) {
      console.warn('[focusOn] zero bbox for', subgraphId);
      return;
    }

    // Step 1: reset to a known fit state.
    panZoomRef.current.resize();
    panZoomRef.current.fit();
    panZoomRef.current.center();

    // Step 2: compute desired realZoom (SVG-units → pixel scale).
    const sizes = panZoomRef.current.getSizes();
    const targetRealZoom = 0.85 * Math.min(sizes.width / bbox.width, sizes.height / bbox.height);
    // svg-pan-zoom uses zoom relative to the original SVG. realZoom = zoom * sizes.realZoom_at_zoom_1.
    // Easiest: compute zoom factor relative to current state.
    const currentZoom = panZoomRef.current.getZoom();
    const zoomFactor = targetRealZoom / sizes.realZoom;
    panZoomRef.current.zoom(currentZoom * zoomFactor);

    // Step 3: pan to center cluster center in viewport.
    const after = panZoomRef.current.getSizes();
    const cx = bbox.x + bbox.width / 2;
    const cy = bbox.y + bbox.height / 2;
    // Viewport pixel coords of the SVG point: (svg - viewBox.xy) * realZoom + currentPan
    // We want this to equal viewport center.
    // currentPan after fit+zoom is unknown; query it:
    const pan = panZoomRef.current.getPan();
    const desiredX = after.width / 2;
    const desiredY = after.height / 2;
    const currentPxX = (cx - after.viewBox.x) * after.realZoom + pan.x;
    const currentPxY = (cy - after.viewBox.y) * after.realZoom + pan.y;
    panZoomRef.current.panBy({
      x: desiredX - currentPxX,
      y: desiredY - currentPxY,
    });

    setZoomPct(Math.round(panZoomRef.current.getZoom() * 100));
    setActiveFocus(subgraphId);
  };

  const FocusButton = ({ id, label, current }) => (
    <button
      onClick={() => focusOn(id)}
      className={`px-3 py-1 rounded-full font-mont font-semibold text-[11.5px] border transition-all ${
        activeFocus === id
          ? 'bg-acs-gold border-acs-charcoal text-acs-charcoal'
          : current
            ? 'bg-yellow-50 border-acs-gold text-acs-charcoal border-dashed hover:bg-acs-gold'
            : 'bg-acs-light-blue border-acs-blue text-acs-blue hover:bg-acs-blue hover:text-white'
      }`}
    >
      {label}
    </button>
  );

  return (
    <div className="space-y-3">
      <div className="bg-white rounded-t-lg shadow-sm p-3 flex flex-wrap justify-between items-center gap-3 border-b-2 border-acs-light-blue">
        <div className="flex gap-1.5 items-center flex-wrap">
          <span className="font-mont text-[11px] font-bold text-gray-500 tracking-wider mr-1">ZOOM</span>
          <button onClick={zoomOut} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-base font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">−</button>
          <span className="font-mont text-[12px] font-bold px-2 mono-num min-w-[50px] text-center">{zoomPct}%</span>
          <button onClick={zoomIn} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-base font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">+</button>
          <button onClick={fit} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-[12px] font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">⛶ Fit All</button>
          <button onClick={fullscreen} className="bg-white border border-gray-300 text-acs-blue px-3 py-1 rounded font-mont text-[12px] font-semibold hover:bg-acs-light-blue hover:border-acs-blue transition-colors">⤢ Full</button>
        </div>
        <div className="flex gap-1.5 items-center flex-wrap">
          <span className="font-mont text-[11px] font-bold text-gray-500 tracking-wider mr-1">FOCUS</span>
          <FocusButton id="INTAKE" label="1. Intake" />
          <FocusButton id="ONBOARD" label="2. Onboarding" />
          <FocusButton id="INVEST" label="3. Investigation" />
          <FocusButton id="TREAT" label="4. Treatment" />
          <FocusButton id="DEMAND" label="5. Demand" />
          <FocusButton id="LIT" label="6. Litigation" />
          <FocusButton id="DISC" label="7. Discovery" />
          <FocusButton id="MED" label="8. Mediation" current />
          <FocusButton id="RES" label="9. Resolution" />
        </div>
      </div>

      <div id="diagram-host" className="bg-white shadow-sm rounded-b-lg relative">
        {/* Uncontrolled host: React renders this div empty, JS injects SVG into it */}
        <div ref={hostRef} className="absolute inset-0" />
        {/* Overlays are SIBLINGS (not children) so React's reconciliation never touches the SVG */}
        {status !== 'ready' && (
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div className={`font-mont text-sm px-4 py-2 rounded ${status === 'error' ? 'text-acs-error bg-red-50 border border-red-200' : 'text-gray-500 bg-white/80'}`}>
              {status === 'init' && 'Initializing…'}
              {status === 'loading' && 'Rendering workflow…'}
              {status === 'error' && (errMsg || 'Failed to render. See browser console.')}
            </div>
          </div>
        )}
      </div>

      <div className="bg-white p-3.5 rounded-md text-[12.5px] border-l-[3px] border-acs-gold shadow-sm">
        <strong className="font-mont text-acs-blue">How to use:</strong> drag to pan · scroll-wheel or +/− to zoom · click any phase chip above to fly to that swim-lane · ⤢ Full goes fullscreen. Decision diamonds (gold) mark settlement-or-litigate forks at Demand and Mediation. Dashed edges show alternate closure paths — e.g., a case dropped at Treatment, or a trial verdict from Mediation. For task-level breakdown of any phase, jump to <em>Personal Injury Lifecycle</em> and expand the phase card.
      </div>

      <div className="bg-white p-3 px-4 rounded shadow-sm flex flex-wrap gap-3.5 text-[12px]">
        {[
          ['#E8F0FE','#0057B8','Standard stage'],
          ['#FFF4D1','#FFD700','Mediation (current)'],
          ['#D4EDDA','#28A745','Resolution'],
          ['#FFD700','#003D80','Decision point'],
        ].map(([bg,bd,label]) => (
          <span key={label} className="flex items-center gap-1.5">
            <span className="inline-block w-3.5 h-3.5 rounded-sm border" style={{ background: bg, borderColor: bd }}></span>
            {label}
          </span>
        ))}
      </div>
    </div>
  );
}

// SF Path component (chevron stages)
function SfPath({ initialCurrentPhase = 6 }) {
  const [currentPhase, setCurrentPhase] = React.useState(initialCurrentPhase);
  const [selectedPhase, setSelectedPhase] = React.useState(initialCurrentPhase);
  const [guidanceOpen, setGuidanceOpen] = React.useState(false);
  const [guidanceTab, setGuidanceTab] = React.useState('guidance');

  const SHORT = {
    INTAKE: 'Intake', CONSULT: 'Consult', PRELIT: 'Pre-Lit', PLEAD: 'Pleadings',
    DISC: 'Discovery', PI_BRANCH: 'PI', IJ: 'Interlocutory', SALE: 'Sale',
    ACCT: 'Accounting', FEES: 'Fees', CLOSE: 'Closeout',
  };
  const ICON = {
    INTAKE: '📞', CONSULT: '🤝', PRELIT: '📋', PLEAD: '📝', DISC: '🔍',
    PI_BRANCH: '⚖', IJ: '🏛', SALE: '💰', ACCT: '📊', FEES: '💵', CLOSE: '✅',
  };

  const stepStyle = (idx, completed, current, selected) => {
    let bg, color;
    if (current) { bg = '#0057B8'; color = '#ffffff'; }
    else if (completed) { bg = '#28A745'; color = '#ffffff'; }
    else { bg = '#ffffff'; color = '#5e6c84'; }

    const isFirst = idx === 0;
    const leftPad = isFirst ? 0 : 10;
    const clipPath = isFirst
      ? 'polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%)'
      : 'polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%, 10px 50%)';
    return {
      background: bg,
      color: color,
      clipPath,
      paddingLeft: `${10 + leftPad}px`,
      paddingRight: '14px',
      cursor: 'pointer',
      filter: selected ? 'drop-shadow(0 0 0 2px #FFD700)' : 'none',
      outline: selected ? '2px solid #FFD700' : 'none',
      transition: 'filter 0.15s, transform 0.1s',
    };
  };

  // If user has selected a different stage from current, button jumps current to selected.
  // If selected === current, button advances current+1.
  const buttonAction = () => {
    if (selectedPhase !== currentPhase) {
      setCurrentPhase(selectedPhase);
    } else if (currentPhase < PHASES.length) {
      const next = currentPhase + 1;
      setCurrentPhase(next);
      setSelectedPhase(next);
    }
  };
  const isJumpMode = selectedPhase !== currentPhase;
  const buttonLabel = isJumpMode ? 'Mark as Current Stage' : 'Mark Stage as Complete';
  const buttonShort = isJumpMode ? 'Set Current' : 'Mark Complete';

  const selected = PHASES[selectedPhase - 1];
  const guidance = PHASE_GUIDANCE[selected.id] || { keyFields: [], guidance: '' };
  const isCurrent = selectedPhase === currentPhase;
  const isCompleted = selectedPhase < currentPhase;
  const isFuture = selectedPhase > currentPhase;
  const stateLabel = isCurrent ? 'CURRENT STAGE' : isCompleted ? 'COMPLETED STAGE' : 'FUTURE STAGE';
  const stateColor = isCurrent ? 'text-acs-blue' : isCompleted ? 'text-acs-success' : 'text-gray-500';

  return (
    <div className="bg-white border border-sf-border shadow-sm rounded">
      {/* PATH BAR */}
      <div className="flex items-stretch p-1.5 gap-px">
        <button onClick={() => setGuidanceOpen(!guidanceOpen)} className="px-2 py-1 mr-1 border border-sf-border rounded text-gray-500 hover:bg-gray-50 text-[12px] flex-shrink-0" title={guidanceOpen ? 'Hide guidance' : 'Show guidance'}>
          <span className={`inline-block transition-transform ${guidanceOpen ? '-rotate-90' : 'rotate-0'}`}>›</span>
        </button>

        <div className="flex items-stretch flex-1 min-w-0">
          {PHASES.map((p, idx) => {
            const completed = p.num < currentPhase;
            const current = p.num === currentPhase;
            const selected = p.num === selectedPhase;
            return (
              <div
                key={p.id}
                onClick={() => setSelectedPhase(p.num)}
                className="flex-1 min-w-0 py-2 font-mont text-[11px] font-semibold flex items-center justify-center gap-1.5 truncate"
                style={stepStyle(idx, completed, current, selected)}
                title={`Phase ${p.num}: ${p.title}${selected ? ' (selected)' : ''}`}
              >
                <span className="text-[12px] flex-shrink-0">{ICON[p.id]}</span>
                <span className="truncate">{SHORT[p.id]}</span>
              </div>
            );
          })}
        </div>

        <button onClick={buttonAction} disabled={!isJumpMode && currentPhase >= PHASES.length} className={`ml-2 px-3 py-2 rounded font-mont font-semibold text-[11.5px] flex items-center gap-1.5 flex-shrink-0 whitespace-nowrap disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors ${isJumpMode ? 'bg-acs-gold text-acs-charcoal hover:bg-yellow-400 ring-2 ring-acs-charcoal/30' : 'bg-acs-blue hover:bg-acs-dark-blue text-white'}`} title={isJumpMode ? `Move current stage to Phase ${selectedPhase}` : 'Advance to next stage'}>
          <span>{isJumpMode ? '⇨' : '✓'}</span>
          <span className="hidden md:inline">{buttonLabel}</span>
          <span className="md:hidden">{buttonShort}</span>
        </button>
        <div className="ml-1 self-center">
          <Feedback section="matter.path" label="Sales Path" />
        </div>
      </div>

      {/* GUIDANCE PANEL */}
      {guidanceOpen && (
        <div className="border-t border-sf-border bg-gray-50">
          <div className="px-4 py-2 flex items-center gap-3 flex-wrap border-b border-sf-border bg-white">
            <span className={`text-[10px] font-mont font-bold uppercase tracking-wider ${stateColor}`}>{stateLabel}</span>
            <span className="text-[13px] font-mont font-bold text-sf-navy">Phase {selected.num}: {selected.title}</span>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-0 bg-white">
            {/* LEFT — Key Fields */}
            <div className="p-4 border-r border-sf-border">
              <div className="flex items-center justify-between mb-3">
                <span className="text-[13px] font-mont font-bold text-acs-charcoal">Key Fields</span>
                <button className="text-[11px] text-sf-blue hover:underline font-mont font-semibold">Edit</button>
              </div>
              <div className="space-y-2.5">
                {guidance.keyFields.map((f, i) => (
                  <div key={i} className="border-b border-gray-100 pb-2 last:border-0 flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="text-[10.5px] uppercase tracking-wider text-gray-500 font-mont">{f.label}</div>
                      <div className="text-[12.5px] text-sf-navy font-medium mt-0.5 break-words">{f.value}</div>
                    </div>
                    <span className="text-gray-300 hover:text-acs-blue cursor-pointer text-[11px] flex-shrink-0 mt-1">✏</span>
                  </div>
                ))}
              </div>
            </div>

            {/* RIGHT — Guidance for Success */}
            <div className="p-4">
              <div className="text-[13px] font-mont font-bold text-acs-charcoal mb-3">Guidance for Success</div>
              <div className="text-[13px] font-mont font-bold text-sf-navy mb-2.5">
                {guidance.guidance.transition}
              </div>
              <ul className="space-y-1.5 text-[12.5px] text-acs-charcoal">
                {guidance.guidance.criteria.map((c, i) => (
                  <li key={i} className="flex items-start gap-2">
                    <span className={`mt-0.5 w-4 h-4 rounded-sm flex-shrink-0 flex items-center justify-center text-[10px] font-bold ${isCompleted || (isCurrent && i < guidance.guidance.criteria.length - 2) ? 'bg-acs-success text-white' : 'bg-white border border-gray-300 text-gray-400'}`}>
                      {(isCompleted || (isCurrent && i < guidance.guidance.criteria.length - 2)) ? '✓' : ''}
                    </span>
                    <span className="leading-snug">{c}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          {isFuture && (
            <div className="px-4 py-2 bg-yellow-50 border-t border-yellow-200 text-[11px] text-gray-600">
              Previewing future phase — these are the fields and steps required to advance the matter <em>to</em> Phase {selected.num}.
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function PartiesMap() {
  const W = 1200;
  const H = 700;
  const cx = W / 2;
  const cy = H / 2;
  const radius = Math.min(W, H) * 0.34;

  // Build node list — flatten participants with role + style
  const nodes = [
    ...MATTER.claimants.map((c) => ({
      name: c.name, role: `${c.role.toLowerCase()} (${c.share})`,
      icon: '👤', fill: '#fce4ec', stroke: '#c23934', textColor: '#7a1f2a',
    })),
    ...MATTER.counselParticipants.map((c) => ({
      name: c.name, role: c.role.toLowerCase(),
      icon: '⚖', fill: '#e3f2fd', stroke: '#0176d3', textColor: '#032d60',
    })),
    ...MATTER.courtParticipants.map((c) => ({
      name: c.name, role: c.role.toLowerCase(),
      icon: '🏛', fill: '#e8eaf6', stroke: '#3f51b5', textColor: '#1a237e',
    })),
    ...MATTER.vendorParticipants.filter((v) => v.phone !== '—').map((c) => ({
      name: c.firm || c.name, role: c.role.toLowerCase(),
      icon: '🏢', fill: '#e8f5e9', stroke: '#28a745', textColor: '#1b5e20',
    })),
    // The property as a special node
    {
      name: '4521 Mockingbird Ln',
      role: 'subject property',
      icon: '🏡', fill: '#fff8e1', stroke: '#FFD700', textColor: '#7a5c00',
    },
  ];

  const positioned = nodes.map((n, i) => {
    const angle = (i / nodes.length) * 2 * Math.PI - Math.PI / 2;
    return { ...n, x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
  });

  return (
    <div className="bg-white border border-sf-border rounded">
      <div className="flex justify-between items-center px-4 py-3 border-b border-sf-border">

      <div className="p-3">
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full block" style={{ background: '#fafbfc', borderRadius: 6, maxHeight: '650px' }}>
          {/* Lines + role labels */}
          {positioned.map((n, i) => {
            const midX = (cx + n.x) / 2;
            const midY = (cy + n.y) / 2;
            return (
              <g key={`line-${i}`}>
                <line x1={cx} y1={cy} x2={n.x} y2={n.y} stroke="#cbd5e0" strokeWidth="1" />
                <text
                  x={midX}

          {/* Participant nodes */}
          {positioned.map((n, i) => (

function RelatedCaseCalendar() {
  const [view, setView] = React.useState({ year: 2026, month: 4 }); // Apr 2026 = today
  const TODAY = '2026-04-29';

  const monthName = (y, m) => new Date(y, m - 1, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
  const daysInMonth = (y, m) => new Date(y, m, 0).getDate();
  const firstDayOfMonth = (y, m) => new Date(y, m - 1, 1).getDay();
  const fmtIso = (y, m, d) => `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

  // Build 6×7 grid for the month (with leading/trailing days from adjacent months)
  const buildGrid = (y, m) => {
    const dim = daysInMonth(y, m);
    const fdow = firstDayOfMonth(y, m);
    const prevDim = daysInMonth(y, m - 1);
    const cells = [];
    // Leading days (previous month)
    for (let i = fdow - 1; i >= 0; i--) {
      const d = prevDim - i;
      const py = m === 1 ? y - 1 : y;
      const pm = m === 1 ? 12 : m - 1;
      cells.push({ date: fmtIso(py, pm, d), day: d, otherMonth: true });
    }
    // Current month
    for (let d = 1; d <= dim; d++) {
      cells.push({ date: fmtIso(y, m, d), day: d, otherMonth: false });
    }
    // Trailing days
    while (cells.length < 42) {
      const offset = cells.length - (fdow + dim) + 1;
      const ny = m === 12 ? y + 1 : y;
      const nm = m === 12 ? 1 : m + 1;
      cells.push({ date: fmtIso(ny, nm, offset), day: offset, otherMonth: true });
    }
    return cells;
  };

  const cells = buildGrid(view.year, view.month);

  const eventsByDate = {};
  MATTER.caseCalendar.forEach((e) => {
    if (!eventsByDate[e.date]) eventsByDate[e.date] = [];
    eventsByDate[e.date].push(e);
  });

      case 'deadline': return 'bg-orange-100 text-orange-900 border-l-2 border-orange-500';
      case 'filing': return 'bg-yellow-100 text-yellow-900';
      case 'task': return 'bg-green-100 text-green-900';
      case 'milestone': return 'bg-purple-100 text-purple-900';
      case 'today': return 'bg-acs-blue text-white font-bold';
      default: return 'bg-gray-100 text-gray-700';
    }
  };

  const prev = () => setView((v) => v.month === 1 ? { year: v.year - 1, month: 12 } : { year: v.year, month: v.month - 1 });
  const next = () => setView((v) => v.month === 12 ? { year: v.year + 1, month: 1 } : { year: v.year, month: v.month + 1 });
  const today = () => setView({ year: 2026, month: 4 });

  const DOW = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];

  return (
    <div className="bg-white border border-sf-border rounded shadow-sm overflow-hidden">

      <div className="flex items-center justify-between px-4 py-3 bg-gray-50 border-b border-sf-border">

          <div>
            <div className="text-[11px] text-gray-500 font-mont uppercase tracking-wider">Matter Calendar</div>
            <div className="text-[18px] font-bold font-mont text-sf-navy">{monthName(view.year, view.month)}</div>
          </div>
        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={prev} className="sf-action-btn px-2">‹</button>
          <button onClick={today} className="sf-action-btn">Today</button>
          <button onClick={next} className="sf-action-btn px-2">›</button>
        </div>
      </div>

      {/* Day-of-week header */}
      <div className="grid grid-cols-7 bg-gray-50 border-b border-sf-border">
        {DOW.map((d) => (
          <div key={d} className="px-2 py-1.5 text-[10px] font-mont font-bold text-gray-500 tracking-wider">{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div className="grid grid-cols-7" style={{ minHeight: '500px' }}>
        {cells.map((c, i) => {
          const isToday = c.date === TODAY;
          const events = eventsByDate[c.date] || [];
          return (
            <div key={i} className={`border-r border-b border-sf-border min-h-[88px] p-1.5 ${c.otherMonth ? 'bg-gray-50' : 'bg-white'} ${isToday ? 'bg-acs-light-blue ring-1 ring-acs-blue ring-inset' : ''} hover:bg-gray-50`}>
              <div className="flex items-center justify-between">
                <span className={`text-[11.5px] font-mont font-bold ${c.otherMonth ? 'text-gray-400' : isToday ? 'text-acs-blue' : 'text-gray-700'}`}>{c.day}</span>
                <button className="text-gray-300 hover:text-acs-blue text-[12px] leading-none">+</button>

              <div className="space-y-0.5 mt-1">

                  <div key={j} className={`text-[9.5px] px-1.5 py-0.5 rounded truncate ${eventClass(e.kind, e.critical)}`} title={e.title}>
                    {e.owner && e.owner !== '' && <span className="font-bold mr-1">({e.owner})</span>}
                    {e.title}
                  </div>
                ))}
              </div>

function DemandCalculator() {
  const d = MATTER.damages;
  const [multiplier, setMultiplier] = React.useState(2.5);
  const medicalSpecials = (d.pastMedical || 0) + (d.futureMedical || 0);
  const painSuffering = Math.round(medicalSpecials * multiplier);
  const wageLoss = (d.pastWageLoss || 0) + (d.futureWageLoss || 0);
  const lossOfConsortium = d.lossOfConsortium || 0;
  const recommendedDemand = medicalSpecials + painSuffering + wageLoss + lossOfConsortium;
  const contingencyPct = 33.33;
  const contingencyFee = Math.round(recommendedDemand * contingencyPct / 100);
  const netToClient = recommendedDemand - contingencyFee;
  return (
    <div className="space-y-4">
      <div className="bg-acs-light-blue border-l-4 border-acs-blue rounded p-3 text-[12px] leading-relaxed text-gray-700">

      </div>

      <div className="flex justify-end gap-2">
        <button className="sf-action-btn">Recompute Demand</button>
        <button className="sf-action-btn">Generate Demand Letter</button>

      {/* Multiplier slider */}
      <div className="sf-card p-4 bg-white">
        <div className="flex items-center justify-between mb-2">
          <div className="font-mont font-bold text-[13px] text-sf-navy">Pain &amp; Suffering Multiplier</div>
          <div className="text-[18px] font-bold mono-num text-acs-blue">{multiplier.toFixed(2)}&times;</div>
        </div>
        <input type="range" min="1.5" max="5.0" step="0.1" value={multiplier} onChange={(e) => setMultiplier(parseFloat(e.target.value))} className="w-full accent-acs-blue" />
        <div className="flex justify-between text-[10.5px] text-gray-500 font-mont mt-1">
          <span>1.5&times; (soft-tissue)</span>
          <span>3.0&times; (surgical)</span>
          <span>5.0&times; (catastrophic)</span>

    <PopupShell title="To Do List" icon="📋" iconColor="#0176d3" onClose={onClose} onMinimize={onMinimize} leftOffset={leftOffset} width={420}>
      <div className="flex items-center gap-1 px-2 py-1.5 border-b border-sf-border bg-white">
        <button className="px-1.5 py-0.5 text-gray-500 hover:bg-gray-100 rounded text-[14px]">←</button>
        <button className="flex items-center gap-1 px-2 py-1 hover:bg-gray-100 rounded text-[12px] font-mont font-semibold text-sf-navy ml-1">
          <span>📋</span><span>All</span>
          <span className="text-[10px] text-gray-400">▾</span>
        </button>
        <div className="ml-auto flex gap-0.5">
          <button className="px-1.5 py-0.5 text-gray-500 hover:bg-gray-100 rounded text-[12px]" title="Search">🔍</button>
          <button className="px-1.5 py-0.5 text-gray-500 hover:bg-gray-100 rounded text-[12px]" title="Refresh">↻</button>
          <button className="px-1.5 py-0.5 text-gray-500 hover:bg-gray-100 rounded text-[12px]" title="Sort">⇅</button>
          <button className="px-1.5 py-0.5 text-gray-500 hover:bg-gray-100 rounded text-[12px]" title="Filter">▽</button>
          <button className="px-1.5 py-0.5 text-gray-500 hover:bg-gray-100 rounded text-[12px]" title="More">▾</button>
        </div>
      </div>
      <div className="px-3 py-1.5 bg-gray-50 border-b border-sf-border text-[11px] text-gray-600">
        <span className="font-medium">{open} items</span> · Sort by: Created Date
      </div>
      <div>
        {items.map((it) => (
          <div
            key={it.id}
            onClick={() => setActive(it.id)}
            className={`flex items-start gap-2 px-3 py-2.5 border-b border-gray-100 last:border-0 cursor-pointer ${
              it.active ? 'bg-yellow-50 border-l-[3px] border-l-acs-gold' : 'hover:bg-gray-50'
            } ${it.complete ? 'opacity-50' : ''}`}
          >
            <span className="mt-0.5 text-[14px] text-gray-400 hover:text-acs-gold flex-shrink-0">☆</span>
            <div className="flex-1 min-w-0">
              <div className={`text-[12.5px] font-mont font-semibold ${it.complete ? 'line-through text-gray-500' : 'text-sf-blue'}`}>{it.name}</div>
              <div className="text-[10.5px] text-gray-500 mt-0.5 flex items-center gap-1">
                {it.urgent && <span className="text-acs-error" title="Urgent">🔴</span>}
                <span>›</span>
                <span>Complete task related to <span className="text-sf-blue">{it.matter}</span> by <span className="font-medium">{it.due}</span></span>
              </div>
            </div>
            {it.active && !it.complete && (
              <div className="flex gap-0.5 flex-shrink-0">
                <button onClick={(e) => { e.stopPropagation(); toggle(it.id); }} className="w-6 h-6 flex items-center justify-center rounded hover:bg-acs-success hover:text-white text-acs-success border border-sf-border bg-white text-[11px]" title="Complete">✓</button>
                <button onClick={(e) => e.stopPropagation()} className="w-6 h-6 flex items-center justify-center rounded hover:bg-acs-blue hover:text-white text-acs-blue border border-sf-border bg-white text-[11px]" title="Tag">🏷</button>
                <button onClick={(e) => e.stopPropagation()} className="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-200 text-gray-500 border border-sf-border bg-white text-[11px]" title="More">▾</button>
              </div>
            )}

        ))}
      </div>
    </PopupShell>
  );
}

// ---------- Date Calculator -----------------------------------------------
function DateCalculatorPopup({ onClose, onMinimize, leftOffset }) {
  const [tab, setTab] = React.useState('add');                 // add | subtract | count
  const [startDate, setStartDate] = React.useState('2026-04-29');
  const [days, setDays] = React.useState('');
  const [months, setMonths] = React.useState('');
  const [years, setYears] = React.useState('');
  const [dayMode, setDayMode] = React.useState('Calendar Days'); // 'Calendar Days' | 'Court Days'
  const [nonBiz, setNonBiz] = React.useState('Select Following Business Day'); // or 'Select Preceding Business Day' | 'Use Date As-Is'
  const [bizDef, setBizDef] = React.useState('Weekdays');     // 'Weekdays' | 'Weekdays + Holidays'
  const [countEnd, setCountEnd] = React.useState('2026-05-06');
  const [result, setResult] = React.useState(null);

  const isWeekend = (d) => { const day = d.getDay(); return day === 0 || day === 6; };
  const adjustNonBiz = (d) => {
    if (bizDef !== 'Weekdays' && bizDef !== 'Weekdays + Holidays') return d;
    const out = new Date(d);
    if (nonBiz === 'Use Date As-Is') return out;
    const step = nonBiz === 'Select Preceding Business Day' ? -1 : 1;
    while (isWeekend(out)) out.setDate(out.getDate() + step);
    return out;
  };
  const addCourt = (date, n) => {
    const out = new Date(date);
    let added = 0;
    const step = n >= 0 ? 1 : -1;
    const target = Math.abs(n);
    while (added < target) {
      out.setDate(out.getDate() + step);
      if (!isWeekend(out)) added++;
    }
    return out;
  };
  const fmtDate = (d) => d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });

  const calculate = () => {
    if (!startDate) return;
    const sign = tab === 'subtract' ? -1 : 1;
    const base = new Date(startDate + 'T00:00:00');
    if (tab === 'count') {
      const end = new Date(countEnd + 'T00:00:00');
      const calendarDays = Math.round((end - base) / 86400000);
      let courtDays = 0;
      const step = calendarDays >= 0 ? 1 : -1;
      const cursor = new Date(base);
      while (cursor.toDateString() !== end.toDateString()) {
        cursor.setDate(cursor.getDate() + step);
        if (!isWeekend(cursor)) courtDays += step;
      }
      setResult({ kind: 'count', calendarDays, courtDays });
      return;
    }
    let out = new Date(base);
    out.setFullYear(out.getFullYear() + sign * (parseInt(years || '0', 10) || 0));
    out.setMonth(out.getMonth() + sign * (parseInt(months || '0', 10) || 0));
    const dn = sign * (parseInt(days || '0', 10) || 0);
    if (dayMode === 'Court Days' && dn !== 0) {
      out = addCourt(out, dn);
    } else {
      out.setDate(out.getDate() + dn);
    }
    out = adjustNonBiz(out);
    setResult({ kind: 'date', date: out });
  };
  const reset = () => { setDays(''); setMonths(''); setYears(''); setResult(null); };

  return (
    <PopupShell title="Date Calculator" icon="⚡" iconColor="#0176d3" onClose={onClose} onMinimize={onMinimize} leftOffset={leftOffset} width={400}>
      <div className="border-b border-sf-border bg-white px-3 flex">
        {[['add', 'Add'], ['subtract', 'Subtract'], ['count', 'Count']].map(([t, label]) => (
          <button key={t} onClick={() => { setTab(t); setResult(null); }} className={`px-3 py-2 text-[12.5px] font-mont font-semibold border-b-2 ${tab === t ? 'border-sf-blue text-sf-navy' : 'border-transparent text-gray-500 hover:text-sf-navy'}`}>{label}</button>
        ))}
      </div>
      <div className="p-3">
        {tab !== 'count' ? (
          <>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label className="text-[11px] text-acs-charcoal font-medium block mb-1">Start Date</label>
                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] focus:outline-none focus:border-acs-blue" />
              </div>
              <div>
                <label className="text-[11px] text-acs-charcoal font-medium block mb-1">Days, Months, Years to {tab === 'add' ? 'Add' : 'Subtract'}</label>
                <div className="flex gap-1">
                  <input type="number" placeholder="d" value={days}   onChange={(e) => setDays(e.target.value)}   className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] text-center mono-num focus:outline-none focus:border-acs-blue" />
                  <input type="number" placeholder="m" value={months} onChange={(e) => setMonths(e.target.value)} className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] text-center mono-num focus:outline-none focus:border-acs-blue" />
                  <input type="number" placeholder="y" value={years}  onChange={(e) => setYears(e.target.value)}  className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] text-center mono-num focus:outline-none focus:border-acs-blue" />
                </div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label className="text-[11px] text-acs-charcoal font-medium block mb-1">{tab === 'add' ? 'Add' : 'Subtract'} Days By</label>
                <select value={dayMode} onChange={(e) => setDayMode(e.target.value)} className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] bg-white focus:outline-none focus:border-acs-blue">
                  <option>Calendar Days</option>
                  <option>Court Days</option>
                </select>
              </div>
              <div>
                <label className="text-[11px] text-acs-charcoal font-medium block mb-1" title="If Date Falls on Non-Business Day">If Date Falls on Non-Busin…</label>
                <select value={nonBiz} onChange={(e) => setNonBiz(e.target.value)} className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] bg-white focus:outline-none focus:border-acs-blue">
                  <option>Select Following Business Day</option>
                  <option>Select Preceding Business Day</option>
                  <option>Use Date As-Is</option>
                </select>
              </div>
            </div>
            <div className="mb-3">
              <label className="text-[11px] text-acs-charcoal font-medium block mb-1" title="Business Days are Determined By">Business Days are Determi…</label>
              <select value={bizDef} onChange={(e) => setBizDef(e.target.value)} className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] bg-white focus:outline-none focus:border-acs-blue">
                <option>Weekdays</option>
                <option>Weekdays + Holidays</option>
              </select>
            </div>
            <div className="border-t border-sf-border -mx-3 px-3 pt-3 flex justify-end gap-2">
              <button onClick={reset} className="sf-action-btn">Reset</button>
              <button onClick={calculate} className="bg-sf-blue hover:bg-acs-dark-blue text-white px-4 py-1.5 rounded font-mont font-semibold text-[12px]">Calculate</button>
            </div>
            {result && result.kind === 'date' && (
              <div className="mt-3 bg-gradient-to-br from-acs-blue to-acs-dark-blue text-white rounded p-3">
                <div className="text-[10px] uppercase tracking-wider opacity-80 font-mont mb-1">Result</div>
                <div className="text-[15px] font-bold font-mont">{fmtDate(result.date)}</div>
                <div className="text-[10.5px] opacity-80 mt-1">
                  {tab === 'add' ? 'After ' : 'Before '}
                  {years && parseInt(years, 10) ? `${years}y ` : ''}
                  {months && parseInt(months, 10) ? `${months}mo ` : ''}
                  {days && parseInt(days, 10) ? `${days} ${dayMode.toLowerCase()}` : ''}
                </div>
              </div>
            )}
          </>
        ) : (
          <>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label className="text-[11px] text-acs-charcoal font-medium block mb-1">Start Date</label>
                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] focus:outline-none focus:border-acs-blue" />
              </div>
              <div>
                <label className="text-[11px] text-acs-charcoal font-medium block mb-1">End Date</label>
                <input type="date" value={countEnd} onChange={(e) => setCountEnd(e.target.value)} className="w-full border border-sf-border rounded px-2 py-1.5 text-[12px] focus:outline-none focus:border-acs-blue" />
              </div>
            </div>
            <div className="border-t border-sf-border -mx-3 px-3 pt-3 flex justify-end gap-2">
              <button onClick={() => { setResult(null); }} className="sf-action-btn">Reset</button>
              <button onClick={calculate} className="bg-sf-blue hover:bg-acs-dark-blue text-white px-4 py-1.5 rounded font-mont font-semibold text-[12px]">Calculate</button>
            </div>
            {result && result.kind === 'count' && (
              <div className="mt-3 bg-gradient-to-br from-acs-blue to-acs-dark-blue text-white rounded p-3 space-y-1.5">
                <div className="flex justify-between items-baseline">
                  <span className="text-[10.5px] uppercase tracking-wider opacity-80 font-mont">Calendar Days</span>
                  <span className="text-[20px] font-bold font-mont mono-num">{result.calendarDays}</span>
                </div>
                <div className="flex justify-between items-baseline border-t border-white/20 pt-1.5">
                  <span className="text-[10.5px] uppercase tracking-wider opacity-80 font-mont">Court Days</span>
                  <span className="text-[20px] font-bold font-mont mono-num">{result.courtDays}</span>
                </div>
              </div>
            )}
            <div className="text-[10px] text-gray-500 mt-3 leading-relaxed">
              Court Days excludes Saturdays and Sundays. CCP § 12a holiday handling not yet wired — verify against the court calendar for filing deadlines. Flag for v2.
            </div>
          </>
        )}
      </div>
    </PopupShell>
  );
}

// ---------- Bar shell ------------------------------------------------------
function UtilityBar() {
  const [openPopup, setOpenPopup] = React.useState(null);    // 'phone' | 'todo' | 'datecalc' | null
  const [minimized, setMinimized] = React.useState({});      // { phone: true } means user has it minimized
  const toggle = (id) => {
    if (openPopup === id) {
      setOpenPopup(null);
    } else {
      setOpenPopup(id);
      setMinimized((m) => ({ ...m, [id]: false }));
    }
  };
  const close = () => setOpenPopup(null);
  const minimize = (id) => {
    setMinimized((m) => ({ ...m, [id]: true }));
    setOpenPopup(null);
  };
  // Anchor each popup to roughly its icon's left edge (icons are ~135px wide, 130px wide, 145px wide).
  const POSITIONS = { phone: 0, todo: 138, datecalc: 268 };
  return (
    <>
      {openPopup === 'phone'    && !minimized.phone    && <RingCentralPopup     onClose={close} onMinimize={() => minimize('phone')}    leftOffset={POSITIONS.phone}    />}
      {openPopup === 'todo'     && !minimized.todo     && <TodoListPopup        onClose={close} onMinimize={() => minimize('todo')}     leftOffset={POSITIONS.todo}     />}
      {openPopup === 'datecalc' && !minimized.datecalc && <DateCalculatorPopup  onClose={close} onMinimize={() => minimize('datecalc')} leftOffset={POSITIONS.datecalc} />}
      <div className="fixed bottom-0 left-0 right-0 h-[46px] bg-gradient-to-b from-gray-50 to-gray-100 border-t border-sf-border shadow-[0_-2px_4px_rgba(0,0,0,0.04)] z-40 flex items-stretch">
        <UtilityIcon label="Ring Central"    active={openPopup === 'phone'}    onClick={() => toggle('phone')}    badge={minimized.phone ? '1' : null}>📞</UtilityIcon>
        <UtilityIcon label="To Do List"      active={openPopup === 'todo'}     onClick={() => toggle('todo')}     badge={minimized.todo ? '·' : null}>📋</UtilityIcon>
        <UtilityIcon label="Date Calculator" active={openPopup === 'datecalc'} onClick={() => toggle('datecalc')} badge={minimized.datecalc ? '·' : null}>⚡</UtilityIcon>
        <div className="ml-auto flex items-center px-3 text-[10.5px] text-gray-500 font-mont border-l border-sf-border">
          <span className="hidden md:inline">Standard PI Demo Console</span>
          <span className="mono-num ml-2 text-gray-400">v1.2</span>
        </div>
      </div>
    </>
  );
}
